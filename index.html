<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap List Guide</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; margin: 0; background: #f7f6f2; color: #222; }
  header { padding: 16px; background: #fff; border-bottom: 1px solid #e5e3dc; position: sticky; top: 0; }
  h1 { font-size: 18px; margin: 0 0 10px; }
  input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
  .tabs { display: flex; gap: 8px; margin-top: 10px; overflow-x: auto; }
  .tab { padding: 6px 12px; border-radius: 999px; border: 1px solid #ccc; font-size: 13px; white-space: nowrap; cursor: pointer; }
  .tab.active { background: #222; color: #fff; border-color: #222; }
  .list { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .card { background: #fff; border: 1px solid #e5e3dc; border-radius: 12px; padding: 12px; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .name { font-weight: 600; font-size: 15px; margin: 0 0 4px; }
  .desc { font-size: 13px; color: #555; margin: 0; }
  .abv { font-size: 12px; background: #fdeed2; color: #7a4b06; padding: 3px 8px; border-radius: 999px; white-space: nowrap; }
  .tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .tag { font-size: 11px; background: #f0efe9; color: #555; padding: 3px 8px; border-radius: 6px; }
  .tag.gf { background: #e3f3e6; color: #2b6b39; }
  .empty { text-align: center; color: #888; padding: 40px 16px; font-size: 14px; }
</style>
</head>
<body>

<header>
  <h1>Tap List Guide</h1>
  <input type="text" id="search" placeholder="Search beer or food item">
  <div class="tabs">
    <div class="tab active" data-type="beer">Beers</div>
    <div class="tab" data-type="food">Food</div>
  </div>
</header>

<div class="list" id="list"></div>

<script>
const BEER_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRfvDNoqxHQCc7PBCm-xetbdDiAfyfi3ECVbnRAfoCYJmdfSxFuamdGJ6THg97ErXp3hFCLG1IBcZsH/pub?gid=0&single=true&output=csv";
const FOOD_CSV_URL = "PASTE_YOUR_FOOD_CSV_LINK_HERE";

let beers = [];
let foods = [];
let activeType = "beer";

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i + 1];
    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n' || c === '\r') {
        if (field !== '' || row.length) { row.push(field); rows.push(row); row = []; field = ''; }
      } else { field += c; }
    }
  }
  if (field !== '' || row.length) { row.push(field); rows.push(row); }
  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).filter(r => r.length > 1).map(r => {
    const obj = {};
    headers.forEach((h, i) => obj[h] = (r[i] || "").trim());
    return obj;
  });
}

async function loadData() {
  const beerText = await fetch(BEER_CSV_URL).then(r => r.text());
  beers = parseCSV(beerText);
  beers = beers.filter(b => b.Name && b.Name.trim() !== "" && b.Name !== "?");

  if (FOOD_CSV_URL !== "PASTE_YOUR_FOOD_CSV_LINK_HERE") {
    const foodText = await fetch(FOOD_CSV_URL).then(r => r.text());
    foods = parseCSV(foodText);
  }
  render();
}

function render() {
  const query = document.getElementById("search").value.toLowerCase();
  const source = activeType === "beer" ? beers : foods;
  const filtered = source.filter(item =>
    (item.Name || "").toLowerCase().includes(query) ||
    (item.Style || "").toLowerCase().includes(query)
  );

  const list = document.getElementById("list");
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">Nothing matches yet.</div>';
    return;
  }

  list.innerHTML = filtered.map(item => {
    const desc = item["Description / ingredients"] || item["Flavor Prodfile"] || "";
    const abv = item.abv ? item.abv + "%" : "";
    const gf = (item["Gluten-Reduced"] || "").toLowerCase() === "yes";
    const guidance = item["Guest Guidance"] || "";
    return `
    <div class="card">
      <div class="card-top">
        <div>
          <p class="name">${item.Name || ""}</p>
          <p class="desc">${item.Style || ""}${desc ? " — " + desc.slice(0, 100) + (desc.length > 100 ? "..." : "") : ""}</p>
        </div>
        ${abv ? `<span class="abv">${abv} ABV</span>` : ""}
      </div>
      <div class="tags">
        ${gf ? `<span class="tag gf">Gluten-reduced</span>` : ""}
        ${guidance ? `<span class="tag">${guidance}</span>` : ""}
      </div>
    </div>
  `;
  }).join("");
}

document.getElementById("search").addEventListener("input", render);
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    activeType = tab.dataset.type;
    render();
  });
});

loadData();
</script>

</body>
</html>
