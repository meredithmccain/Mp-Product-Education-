<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manhattan Project Tap List Guide</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Helvetica Neue", sans-serif; margin: 0; background: #fafafa; color: #111; -webkit-font-smoothing: antialiased; }
  header { padding: 22px 16px 16px; background: #111; border-bottom: 1px solid #111; position: sticky; top: 0; z-index: 10; }
  .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .brand svg { flex-shrink: 0; }
  .brand-text h1 { font-size: 17px; font-weight: 700; margin: 0; color: #fff; letter-spacing: 0.02em; }
  .brand-text p { font-size: 10px; font-weight: 500; margin: 2px 0 0; color: #999; letter-spacing: 0.12em; }
  input[type="text"] { width: 100%; padding: 11px 14px; border: 1px solid #333; border-radius: 10px; font-size: 14px; background: #1c1c1c; color: #fff; outline: none; transition: border-color 0.15s; }
  input[type="text"]::placeholder { color: #777; }
  input[type="text"]:focus { border-color: #fff; }
  .tabs { display: flex; gap: 6px; margin-top: 12px; overflow-x: auto; padding-bottom: 2px; }
  .tab { padding: 7px 14px; border-radius: 999px; border: 1px solid #333; font-size: 12.5px; font-weight: 500; white-space: nowrap; cursor: pointer; color: #ccc; transition: all 0.15s; }
  .tab.active { background: #fff; color: #111; border-color: #fff; }
  .list { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .card { background: #fff; border: 1px solid #ececec; border-radius: 14px; padding: 14px 16px; transition: border-color 0.15s; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .name { font-weight: 600; font-size: 15px; margin: 0 0 3px; letter-spacing: -0.01em; }
  .desc { font-size: 12.5px; color: #777; margin: 0; line-height: 1.45; }
  .abv { font-size: 11px; font-weight: 600; background: #111; color: #fff; padding: 4px 9px; border-radius: 999px; white-space: nowrap; }
  .tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .tag { font-size: 10.5px; font-weight: 500; background: #f2f2f2; color: #555; padding: 4px 9px; border-radius: 6px; }
  .tag.gf { background: #e9f5ec; color: #1e7a3d; }
  .tag.new { background: #111; color: #fff; }
  .empty { text-align: center; color: #999; padding: 60px 16px; font-size: 13.5px; }
  .game-card { background: #fff; border: 1px solid #ececec; border-radius: 18px; padding: 28px 18px; margin: 14px; text-align: center; }
  .game-question { font-size: 14.5px; color: #222; margin-bottom: 22px; line-height: 1.6; }
  .game-options { display: flex; flex-direction: column; gap: 8px; }
  .game-option { padding: 13px 14px; border: 1px solid #e0e0e0; border-radius: 11px; background: #fff; font-size: 13.5px; font-weight: 500; cursor: pointer; text-align: left; transition: all 0.15s; }
  .game-option:hover { border-color: #bbb; }
  .game-option.correct { background: #e9f5ec; border-color: #1e7a3d; color: #1e7a3d; }
  .game-option.wrong { background: #fbeaea; border-color: #b33; color: #b33; }
  .game-next { margin-top: 18px; padding: 11px 22px; background: #111; color: #fff; border: none; border-radius: 999px; font-size: 13.5px; font-weight: 500; cursor: pointer; }
  .game-next:hover { background: #333; }
  .game-score { text-align: center; font-size: 12px; color: #999; margin: 10px 16px 0; font-weight: 500; }
  .flash-card { background: #fff; border: 1px solid #ececec; border-radius: 18px; padding: 36px 18px; margin: 14px; text-align: center; min-height: 140px; display: flex; flex-direction: column; justify-content: center; cursor: pointer; transition: border-color 0.15s; }
  .flash-card:hover { border-color: #ccc; }
  .flash-nav { display: flex; justify-content: space-between; padding: 0 16px; margin-top: 12px; }
  .flash-nav button { padding: 9px 18px; border: 1px solid #e0e0e0; border-radius: 999px; background: #fff; font-size: 13px; font-weight: 500; cursor: pointer; transition: border-color 0.15s; }
  .flash-nav button:hover { border-color: #111; }
  .flash-count { text-align: center; font-size: 11.5px; color: #999; margin-top: 10px; font-weight: 500; }
  .new-banner { margin: 14px 14px 0; background: #111; border-radius: 14px; padding: 16px; color: #fff; position: relative; overflow: hidden; min-height: 76px; }
  .new-banner-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: #999; margin: 0 0 6px; }
  .new-banner-name { font-size: 16px; font-weight: 600; margin: 0 0 3px; }
  .new-banner-desc { font-size: 12px; color: #bbb; margin: 0; line-height: 1.4; }
  .new-banner-dots { display: flex; gap: 5px; margin-top: 10px; }
  .new-banner-dot { width: 5px; height: 5px; border-radius: 50%; background: #444; }
  .new-banner-dot.active { background: #fff; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <svg width="34" height="34" viewBox="0 0 100 100">
      <ellipse cx="50" cy="50" rx="46" ry="18" fill="none" stroke="#fff" stroke-width="3" transform="rotate(0 50 50)"/>
      <ellipse cx="50" cy="50" rx="46" ry="18" fill="none" stroke="#fff" stroke-width="3" transform="rotate(60 50 50)"/>
      <ellipse cx="50" cy="50" rx="46" ry="18" fill="none" stroke="#fff" stroke-width="3" transform="rotate(120 50 50)"/>
      <rect x="43" y="32" width="14" height="40" rx="2" fill="#fff"/>
      <rect x="46" y="22" width="8" height="12" fill="#fff"/>
      <rect x="47" y="16" width="6" height="8" rx="1" fill="#fff"/>
    </svg>
    <div class="brand-text">
      <h1>MANHATTAN PROJECT</h1>
      <p>BEER COMPANY</p>
    </div>
  </div>
  <input type="text" id="search" placeholder="Search beer or food item">
  <div class="tabs">
    <div class="tab active" data-type="beer">Beers</div>
    <div class="tab" data-type="ontap">On Tap</div>
    <div class="tab" data-type="food">Food</div>
    <div class="tab" data-type="flash">Flashcards</div>
    <div class="tab" data-type="quiz">Quiz</div>
    <div class="tab" data-type="practice">Practice</div>
  </div>
</header>

<div id="content"></div>

<script>
const BEER_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRfvDNoqxHQCc7PBCm-xetbdDiAfyfi3ECVbnRAfoCYJmdfSxFuamdGJ6THg97ErXp3hFCLG1IBcZsH/pub?gid=0&single=true&output=csv";
const FOOD_CSV_URL = "PASTE_YOUR_FOOD_CSV_LINK_HERE";

let beers = [];
let foods = [];
let activeType = "beer";
let flashIndex = 0;
let flashFlipped = false;
let quizItem = null;
let quizScore = { right: 0, total: 0 };
let practiceItem = null;
let practiceScore = { right: 0, total: 0 };
let newTapIndex = 0;
let newTapTimer = null;

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], next = text[i + 1];
    if (inQuotes) {
      if (c === '"' && next === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') inQuotes = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n' || c === '\r') {
        if (field !== '' || row.length) { row.push(field); rows.push(row); row = []; field = ''; }
      } else { field += c; }
    }
  }
  if (field !== '' || row.length) { row.push(field); rows.push(row); }
  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).filter(r => r.length > 1).map(r => {
    const obj = {};
    headers.forEach((h, i) => obj[h] = (r[i] || "").trim());
    return obj;
  });
}

async function loadData() {
  const beerText = await fetch(BEER_CSV_URL).then(r => r.text());
  beers = parseCSV(beerText);
  beers = beers.filter(b => b.Name && b.Name.trim() !== "" && b.Name !== "?");

  if (FOOD_CSV_URL !== "PASTE_YOUR_FOOD_CSV_LINK_HERE") {
    const foodText = await fetch(FOOD_CSV_URL).then(r => r.text());
    foods = parseCSV(foodText);
  }
  render();
  startNewTapRotation();
}

function getDesc(item) {
  return item["Description / ingredients"] || item["Flavor Prodfile"] || "";
}

function isYes(val) {
  return (val || "").toLowerCase().trim().startsWith("yes");
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function render() {
  const content = document.getElementById("content");
  if (activeType === "beer" || activeType === "food" || activeType === "ontap") {
    renderList(content);
  } else if (activeType === "flash") {
    renderFlash(content);
  } else if (activeType === "quiz") {
    renderQuiz(content);
  } else if (activeType === "practice") {
    renderPractice(content);
  }
}

function renderNewTapBanner() {
  const newBeers = beers.filter(b => isYes(b["New Tap"]));
  if (newBeers.length === 0) return "";
  if (newTapIndex >= newBeers.length) newTapIndex = 0;
  const b = newBeers[newTapIndex];
  const desc = getDesc(b).slice(0, 90);
  return `
    <div class="new-banner">
      <p class="new-banner-label">NEWLY TAPPED</p>
      <p class="new-banner-name">${b.Name}</p>
      <p class="new-banner-desc">${b.Style || ""}${desc ? " — " + desc : ""}</p>
      <div class="new-banner-dots">
        ${newBeers.map((_, i) => `<div class="new-banner-dot${i === newTapIndex ? ' active' : ''}"></div>`).join("")}
      </div>
    </div>
  `;
}

function startNewTapRotation() {
  if (newTapTimer) clearInterval(newTapTimer);
  newTapTimer = setInterval(() => {
    const newBeers = beers.filter(b => isYes(b["New Tap"]));
    if (newBeers.length === 0) return;
    newTapIndex = (newTapIndex + 1) % newBeers.length;
    if (activeType === "beer" || activeType === "ontap") render();
  }, 4000);
}

function renderList(content) {
  const query = document.getElementById("search").value.toLowerCase();
  let source = activeType === "food" ? foods : beers;
  if (activeType === "ontap") {
    source = source
      .filter(b => isYes(b["On Tap"]))
      .sort((a, b) => {
        const matchA = (a["On Tap"] || "").match(/\d+/);
        const matchB = (b["On Tap"] || "").match(/\d+/);
        const tapA = matchA ? Number(matchA[0]) : 999;
        const tapB = matchB ? Number(matchB[0]) : 999;
        return tapA - tapB;
      });
  }
  const filtered = source.filter(item =>
    (item.Name || "").toLowerCase().includes(query) ||
    (item.Style || "").toLowerCase().includes(query)
  );

  const banner = (activeType === "beer" || activeType === "ontap") ? renderNewTapBanner() : "";

  if (filtered.length === 0) {
    content.innerHTML = banner + '<div class="empty">Nothing matches yet.</div>';
    return;
  }
  content.innerHTML = banner + '<div class="list">' + filtered.map(item => {
    const desc = getDesc(item);
    const abv = item.abv ? item.abv + "%" : "";
    const gf = isYes(item["Gluten-Reduced"]);
    const isNew = isYes(item["New Tap"]);
    const guidance = item["Guest Guidance"] || "";
    const tapNumberMatch = (item["On Tap"] || "").match(/\d+/);
    const tapNumber = tapNumberMatch ? tapNumberMatch[0] : "";

    return `
    <div class="card">
      <div class="card-top">
        <div>
          <p class="name">${item.Name || ""}</p>
          <p class="desc">${item.Style || ""}${desc ? " — " + desc.slice(0, 100) + (desc.length > 100 ? "..." : "") : ""}</p>
        </div>
        ${abv ? `<span class="abv">${abv} ABV</span>` : ""}
      </div>
      <div class="tags">
        ${tapNumber ? `<span class="tag new">Tap ${tapNumber}</span>` : ""}
        ${isNew ? `<span class="tag new">New</span>` : ""}
        ${gf ? `<span class="tag gf">Gluten-reduced</span>` : ""}
        ${guidance ? `<span class="tag">${guidance}</span>` : ""}
      </div>
    </div>`;
  }).join("") + '</div>';
}

function renderFlash(content) {
  const pool = beers.filter(b => getDesc(b) || b.Style);
  if (pool.length === 0) { content.innerHTML = '<div class="empty">No beers loaded yet.</div>'; return; }
  if (flashIndex >= pool.length) flashIndex = 0;
  const b = pool[flashIndex];
  content.innerHTML = `
    <div class="flash-card" onclick="flashFlipped = !flashFlipped; render();">
      ${!flashFlipped ? `
        <p style="font-size:18px;font-weight:600;margin:0 0 6px;">${b.Name}</p>
        <p style="font-size:12.5px;color:#999;">Tap to reveal details</p>
      ` : `
        <p style="font-size:16px;font-weight:600;margin:0 0 6px;">${b.Name}</p>
        <p style="font-size:12.5px;color:#666;margin:0 0 8px;">${b.Style || ""} ${b.abv ? "· " + b.abv + "%" : ""}</p>
        <p style="font-size:12.5px;color:#666;line-height:1.5;">${getDesc(b).slice(0, 160)}</p>
      `}
    </div>
    <div class="flash-nav">
      <button onclick="flashIndex = (flashIndex - 1 + ${pool.length}) % ${pool.length}; flashFlipped = false; render();">Previous</button>
      <button onclick="flashIndex = (flashIndex + 1) % ${pool.length}; flashFlipped = false; render();">Next</button>
    </div>
    <div class="flash-count">${flashIndex + 1} of ${pool.length}</div>
  `;
}

function newQuiz() {
  const pool = beers.filter(b => getDesc(b) && b.Name);
  if (pool.length < 4) { quizItem = null; return; }
  const correct = pool[Math.floor(Math.random() * pool.length)];
  const wrongPool = shuffle(pool.filter(b => b.Name !== correct.Name)).slice(0, 3);
  const options = shuffle([correct, ...wrongPool]);
  quizItem = { correct, options, answered: false };
}

function renderQuiz(content) {
  if (!quizItem) newQuiz();
  if (!quizItem) { content.innerHTML = '<div class="empty">Not enough beer data loaded yet.</div>'; return; }
  const desc = getDesc(quizItem.correct).slice(0, 180);
  content.innerHTML = `
    <div class="game-card">
      <p class="game-question">Which beer matches this description?<br><br>"${desc}"</p>
      <div class="game-options">
        ${quizItem.options.map(o => {
          let cls = "game-option";
          if (quizItem.answered) {
            if (o.Name === quizItem.correct.Name) cls += " correct";
            else if (o.Name === quizItem.selected) cls += " wrong";
          }
          return `<div class="${cls}" onclick="answerQuiz('${o.Name.replace(/'/g, "\\'")}')">${o.Name}</div>`;
        }).join("")}
      </div>
      ${quizItem.answered ? `<button class="game-next" onclick="newQuiz(); render();">Next question</button>` : ""}
    </div>
    <div class="game-score">Score: ${quizScore.right} / ${quizScore.total}</div>
  `;
}

function answerQuiz(name) {
  if (quizItem.answered) return;
  quizItem.answered = true;
  quizItem.selected = name;
  quizScore.total++;
  if (name === quizItem.correct.Name) quizScore.right++;
  render();
}

function newPractice() {
  const pool = beers.filter(b => b["Guest Guidance"] && b.Name);
  if (pool.length < 4) { practiceItem = null; return; }
  const correct = pool[Math.floor(Math.random() * pool.length)];
  const wrongPool = shuffle(pool.filter(b => b.Name !== correct.Name)).slice(0, 3);
  const options = shuffle([correct, ...wrongPool]);
  practiceItem = { correct, options, answered: false };
}

function renderPractice(content) {
  if (!practiceItem) newPractice();
  if (!practiceItem) {
    content.innerHTML = '<div class="empty">Add Guest Guidance to your sheet first — this game uses that column.</div>';
    return;
  }
  content.innerHTML = `
    <div class="game-card">
      <p class="game-question">A guest says: "${practiceItem.correct["Guest Guidance"]}"<br><br>Which beer do you recommend?</p>
      <div class="game-options">
        ${practiceItem.options.map(o => {
          let cls = "game-option";
          if (practiceItem.answered) {
            if (o.Name === practiceItem.correct.Name) cls += " correct";
            else if (o.Name === practiceItem.selected) cls += " wrong";
          }
          return `<div class="${cls}" onclick="answerPractice('${o.Name.replace(/'/g, "\\'")}')">${o.Name}</div>`;
        }).join("")}
      </div>
      ${practiceItem.answered ? `<button class="game-next" onclick="newPractice(); render();">Next</button>` : ""}
    </div>
    <div class="game-score">Score: ${practiceScore.right} / ${practiceScore.total}</div>
  `;
}

function answerPractice(name) {
  if (practiceItem.answered) return;
  practiceItem.answered = true;
  practiceItem.selected = name;
  practiceScore.total++;
  if (name === practiceItem.correct.Name) practiceScore.right++;
  render();
}

document.getElementById("search").addEventListener("input", render);
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    activeType = tab.dataset.type;
    render();
  });
});

loadData();
</script>

</body>
</html>
